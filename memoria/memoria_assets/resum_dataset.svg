<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Resum del dataset</title>
  <desc id="desc">Indicadors bàsics, distribució d'estat i cobertura dels camps</desc>
  <rect width="1200" height="860" fill="#f8fafc"/>
  <rect x="40" y="40" width="1120" height="780" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>

  <text x="600" y="95" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#111827">
    Resum del dataset final
  </text>
  <text x="600" y="130" font-family="Helvetica, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#475569">
    Instantània del CSV generat a partir del portal CIDO
  </text>

  <rect x="90" y="175" width="310" height="120" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="245" y="225" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#1e3a8a">
    115 registres
  </text>
  <text x="245" y="258" font-family="Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#334155">
    una fila per oferta
  </text>

  <rect x="445" y="175" width="310" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="600" y="225" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#14532d">
    17 columnes
  </text>
  <text x="600" y="258" font-family="Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#334155">
    nucli fix i camps opcionals
  </text>

  <rect x="800" y="175" width="310" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="955" y="225" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#5b21b6">
    115 URL úniques
  </text>
  <text x="955" y="258" font-family="Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#334155">
    també 115 identificadors únics
  </text>

  <text x="150" y="365" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">
    Distribució de l'estat
  </text>
  <rect x="150" y="395" width="620" height="32" rx="16" fill="#e5e7eb"/>
  <rect x="150" y="395" width="562" height="32" rx="16" fill="#2563eb"/>
  <rect x="712" y="395" width="58" height="32" rx="16" fill="#f59e0b"/>
  <text x="150" y="455" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1f2937">
    Termini obert, 104 registres, 90.4%
  </text>
  <text x="150" y="485" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1f2937">
    Pendent de termini, 11 registres, 9.6%
  </text>

  <text x="150" y="565" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">
    Cobertura dels camps més rellevants
  </text>

  <text x="150" y="615" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#1f2937">title</text>
  <rect x="335" y="598" width="420" height="24" rx="12" fill="#e5e7eb"/>
  <rect x="335" y="598" width="420" height="24" rx="12" fill="#0f766e"/>
  <text x="780" y="616" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1f2937">100%</text>

  <text x="150" y="655" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#1f2937">url</text>
  <rect x="335" y="638" width="420" height="24" rx="12" fill="#e5e7eb"/>
  <rect x="335" y="638" width="420" height="24" rx="12" fill="#0f766e"/>
  <text x="780" y="656" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1f2937">100%</text>

  <text x="150" y="695" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#1f2937">status</text>
  <rect x="335" y="678" width="420" height="24" rx="12" fill="#e5e7eb"/>
  <rect x="335" y="678" width="420" height="24" rx="12" fill="#0f766e"/>
  <text x="780" y="696" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1f2937">100%</text>

  <text x="150" y="735" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#1f2937">Finalització de presentació</text>
  <rect x="335" y="718" width="420" height="24" rx="12" fill="#e5e7eb"/>
  <rect x="335" y="718" width="420" height="24" rx="12" fill="#0f766e"/>
  <text x="780" y="736" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1f2937">100%</text>

  <text x="150" y="775" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#1f2937">Accés al tràmit</text>
  <rect x="335" y="758" width="420" height="24" rx="12" fill="#e5e7eb"/>
  <rect x="335" y="758" width="358" height="24" rx="12" fill="#0f766e"/>
  <text x="780" y="776" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1f2937">85.2%</text>

  <text x="845" y="365" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">
    Lectura ràpida
  </text>
  <text x="845" y="405" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#334155">
    Dataset útil per anàlisi descriptiva
  </text>
  <text x="845" y="438" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#334155">
    Cobertura alta dels camps bàsics
  </text>
  <text x="845" y="471" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#334155">
    Alguns camps són molt esparsos
  </text>
  <text x="845" y="504" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#334155">
    Esquema mixt en català i anglès
  </text>
  <text x="845" y="537" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#334155">
    El període de terminis va del
  </text>
  <text x="845" y="565" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#334155">
    03/04/2026 al 31/12/2026
  </text>
</svg>
