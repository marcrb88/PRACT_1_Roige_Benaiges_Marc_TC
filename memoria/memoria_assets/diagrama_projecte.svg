<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama del projecte de scraping</title>
  <desc id="desc">Flux des del portal CIDO fins al dataset CSV final</desc>
  <rect width="1200" height="720" fill="#f7f7f2"/>
  <rect x="60" y="50" width="1080" height="620" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>

